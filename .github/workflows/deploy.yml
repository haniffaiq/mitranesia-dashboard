name: Deploy dashboard FE

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund
          # workaround npm optionalDependencies platform bug (rollup native bin)
          npm install --no-save --no-audit --no-fund @rollup/rollup-linux-x64-gnu

      - name: Build
        run: npm run build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ship dist + Dockerfile + nginx.conf to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            dist/ "$VPS_USER@$VPS_HOST:/srv/dashboard/dist/"
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            Dockerfile.podman nginx.podman.conf \
            "$VPS_USER@$VPS_HOST:/srv/dashboard/"

      - name: Build podman image + restart container
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "set -e; cd /srv/dashboard && podman build -t mitranesia-dashboard:latest -f Dockerfile.podman . && systemctl restart container-mitranesia-dashboard && sleep 3 && systemctl is-active container-mitranesia-dashboard"

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' https://dashboard.mitranesia.id/ || true)
            if [ "$code" = "200" ]; then echo "OK code=$code"; exit 0; fi
            echo "attempt $i code=$code, retrying..."
            sleep 3
          done
          echo "smoke test failed"; exit 1
